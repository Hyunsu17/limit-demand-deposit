spring:
  application:
    name: limit-demand-deposit
  profiles:
    default: dev
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/limitdeposit
    username: limitdeposit
    password: limitdeposit
    driver-class-name: org.postgresql.Driver

jwt:
  secret: ZGV2LXNlY3JldC1rZXktbXVzdC1iZS1hdC1sZWFzdC0yNTYtYml0cy1mb3ItaHMyNTYtYWxnb3JpdGhtIQ==

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:tc:postgresql:16:///limitdeposit
    username: limitdeposit
    password: limitdeposit
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

jwt:
  secret: dGVzdC1zZWNyZXQta2V5LW11c3QtYmUtYXQtbGVhc3QtMjU2LWJpdHMtZm9yLWhzMjU2LWFsZ29yaXRobSE=
